<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Vue Select Example</title>
		<!-- 确保这里的路径指向正确的 vue.js 文件 -->
		<script src="vue.js"></script>
	</head>
	<body>
		<div id="app">
			<!-- 修改点：v-for 改为遍历 options (复数) -->
			<select v-model="selected">
				<option v-for="option in options" v-bind:value="option.value">{{option.text}}</option>
			</select>
			<span>Selected: {{selected}}</span>
		</div>

		<!-- 修改点：type 改为 text/javascript -->
		<script type="text/javascript">
			var vm = new Vue({
				el: "#app",
				// 修改点：data 后加上冒号 :
				data: {
					selected: "A",
					options: [
						{
							text: 'One',
							value: 'A'
						},
						{
							text: "Two",
							value: 'B'
						},
						{
							// 修改点：加上引号，并修正拼写
							text: 'Three', 
							value: 'C'
						}
					]
				}
			})
		</script>
	</body>
</html>
