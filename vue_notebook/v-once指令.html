<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
		<title>v-once指令</title>
        <script src="vue.js"></script>
    </head>
    <body>
    <div id="app">
        <p v-once>原始值：{{message}}</p> 
        <!--v-once:让一个元素或组件只渲染一次，之后便不再响应任何数据变化。-->    
        <p>后面的：{{message}}</p>
        <input type="text" name="" value="" v-model="message"/>
    </div>
    <script type="text/javascript">
        var vm = new Vue({
            el:"#app",
            data:{
                message:'今天天气真好!'
            }
        })
    </script>
    </body>
</html>
