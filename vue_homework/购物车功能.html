<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车功能</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        .button { padding: 5px 10px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 3px; }
        .delete-button { background-color: #dc3545; }
        #total { margin-top: 20px; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>购物车</h1>
    <table id="cartTable">
        <thead>
            <tr>
                <th>商品名称</th>
                <th>商品单价</th>
                <th>购买数量</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="cart"></tbody>
    </table>
    <div id="total">总价：0元</div>

    <script>
        let products = [
            { id: 1, name: 'Apple', price: 10, quantity: 1 },
            { id: 2, name: 'Orange', price: 5, quantity: 1 },
            { id: 3, name: 'Banana', price: 20, quantity: 1 }
        ];

        function renderCart() {
            const cartBody = document.getElementById('cart');
            cartBody.innerHTML = '';
            products.forEach(product => {
                cartBody.innerHTML += `
                    <tr>
                        <td>${product.name}</td>
                        <td>${product.price}</td>
                        <td>
                            <button class="button" data-id="${product.id}" data-action="decrease">-</button>
                            <span>${product.quantity}</span>
                            <button class="button" data-id="${product.id}" data-action="increase">+</button>
                        </td>
                        <td>
                            <button class="button delete-button" data-id="${product.id}" data-action="delete">删除</button>
                        </td>
                    </tr>
                `;
            });
            updateTotal();
        }

        function updateTotal() {
            const total = products.reduce((sum, product) => sum + product.price * product.quantity, 0);
            document.getElementById('total').textContent = `总价：${total}元`;
        }

        document.getElementById('cart').addEventListener('click', (event) => {
            const button = event.target;
            if (button.classList.contains('button')) {
                const id = parseInt(button.dataset.id);
                const action = button.dataset.action;
                const product = products.find(p => p.id === id);
                if (product) {
                    switch (action) {
                        case 'increase': product.quantity++; break;
                        case 'decrease': if (product.quantity > 1) product.quantity--; break;
                        case 'delete': products = products.filter(p => p.id !== id); break;
                    }
                    renderCart();
                }
            }
        });

        renderCart();
    </script>
</body>
</html>
