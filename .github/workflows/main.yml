name: Gitee ↔ GitHub 双向同步

on:
  push:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 添加 Gitee 远程
        run: |
          git remote add gitee https://jingyisi:${{ secrets.GITEE_TOKEN }}@gitee.com/jingyisi/jingyisi-my-project.git

      - name: 拉取 Gitee 最新
        run: git pull gitee main --rebase --allow-unrelated-histories || true

      - name: 推送到 Gitee
        run: git push gitee --all --force-with-lease
      
      - name: 推送到 GitHub
        run: git push origin --all --force-with-lease
